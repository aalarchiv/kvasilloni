name: release

# Build the Windows DLLs and publish a GitHub release ONLY when a version tag
# is pushed (e.g. v0.2.0). No build runs on ordinary branch pushes. Each arch
# ships as a self-contained zip (DLL + README + license + INI example).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the release and upload assets

jobs:
  build:
    name: build ${{ matrix.arch }} (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: i686-pc-windows-gnu
            arch: x86      # 32-bit (most legacy Kvaser apps)
          - target: x86_64-pc-windows-gnu
            arch: x64      # 64-bit
    steps:
      - uses: actions/checkout@v5

      - name: Install mingw-w64 cross linkers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release DLL
        run: cargo build --release --target ${{ matrix.target }}

      - name: Assemble per-arch zip
        run: |
          pkg="kvasilloni-${{ github.ref_name }}-${{ matrix.arch }}"
          mkdir -p "dist/$pkg"
          cp "target/${{ matrix.target }}/release/canlib32.dll" "dist/$pkg/canlib32.dll"
          cp README.md kvasilloni.ini.example COPYING COPYING.LESSER "dist/$pkg/"
          (cd dist && zip -r "$pkg.zip" "$pkg")
          echo "== $pkg.zip =="
          unzip -l "dist/$pkg.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: zip-${{ matrix.arch }}
          path: dist/kvasilloni-${{ github.ref_name }}-${{ matrix.arch }}.zip
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built zips
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect assets and compute checksums
        run: |
          mkdir -p release
          find artifacts -name '*.zip' -exec cp {} release/ \;
          cd release
          sha256sum *.zip > SHA256SUMS.txt
          echo "== SHA256SUMS.txt =="
          cat SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/*.zip
            release/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            Drop-in Kvaser `canlib32.dll` cannelloni shim.

            | Asset | Use for |
            |---|---|
            | `kvasilloni-${{ github.ref_name }}-x86.zip` | 32-bit Windows apps (most legacy Kvaser apps) |
            | `kvasilloni-${{ github.ref_name }}-x64.zip` | 64-bit Windows apps |

            Each zip contains `canlib32.dll`, `README.md`, `kvasilloni.ini.example`,
            and the LGPL license texts (`COPYING`, `COPYING.LESSER`). Drop
            `canlib32.dll` next to your application's executable. Verify the
            download with `sha256sum -c SHA256SUMS.txt`.
